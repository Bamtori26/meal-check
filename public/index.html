<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>급식·우유·간식 체크</title>

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <link rel="stylesheet" href="./css/style.css" />
</head>

<body class="theme-meal">
  <main class="app-shell">
    <section class="top-bar" aria-labelledby="mainTitle">
      <div>
        <h1 id="mainTitle">급식 체크</h1>
        <p id="subtitle">이미지를 누르면 먹은 양이 1/3씩 줄어들어요.</p>
      </div>

      <nav class="tabs" aria-label="체크 종류">
        <button class="tab-btn active" id="mealTab" type="button" aria-selected="true">급식</button>
        <button class="tab-btn" id="milkTab" type="button" aria-selected="false">우유</button>
        <button class="tab-btn" id="snackTab" type="button" aria-selected="false">간식</button>
      </nav>
    </section>

    <section class="toolbar" aria-label="카드 관리">
      <button class="tool-btn edit-btn" id="editBtn" type="button">카드 수정</button>
      <button class="tool-btn save-btn" id="saveBtn" type="button">카드 저장</button>
      <button class="tool-btn default-btn" id="defaultBtn" type="button">기본 카드로</button>
    </section>

    <section class="card-grid" id="cardGrid" aria-label="유아 체크 카드"></section>

    <section class="summary-panel">
      <div class="actions">
        <button class="action-btn check-btn" id="checkBtn" type="button">최종 확인</button>
        <button class="action-btn reset-btn" id="resetBtn" type="button">오늘 급식 체크 초기화</button>
      </div>
      <div class="result" id="result" aria-live="polite">
        급식 탭이 준비되었어요. 이미지를 눌러 체크해 주세요.
      </div>
    </section>

    <section class="history-panel" aria-labelledby="historyTitle">
      <h2 id="historyTitle">급식 날짜별 기록</h2>
      <div class="actions">
        <input class="date-input" id="recordDate" type="date" />
        <button class="action-btn record-btn" id="saveRecordBtn" type="button">날짜 기록 저장</button>
        <button class="action-btn excel-btn" id="excelBtn" type="button">엑셀 다운로드</button>
        <button class="action-btn delete-btn" id="clearHistoryBtn" type="button">기록 전체 삭제</button>
      </div>
      <div class="table-wrap" id="historyWrap"></div>
    </section>
  </main>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
